<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14181F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Daily Habits" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>Daily Habits — Pravin &amp; Swetha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#ECEEE9;
    --surface:#FFFFFF;
    --surface-2:#F5F6F2;
    --ink:#161A20;
    --ink-2:#3A3F49;
    --muted:#767C86;
    --line:#E6E7E1;
    --line-2:#D6D8CF;
    --pravin:#E08A1E; --pravin-deep:#96570A;
    --swetha:#DD5A86; --swetha-deep:#A33560;
    --accent:var(--pravin); --accent-deep:var(--pravin-deep);
    --r:20px; --r-sm:13px; --r-xs:9px;
    --sh-1:0 1px 2px rgba(16,20,28,.05);
    --sh-2:0 2px 6px rgba(16,20,28,.06), 0 14px 34px -18px rgba(16,20,28,.30);
    --sh-3:0 4px 12px rgba(16,20,28,.08), 0 24px 48px -20px rgba(16,20,28,.34);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;color:var(--ink);
    background:radial-gradient(120% 90% at 50% -10%, color-mix(in srgb, var(--accent) 15%, var(--canvas)) 0%, var(--canvas) 46%) fixed;
    -webkit-font-smoothing:antialiased;line-height:1.45;
    padding-bottom:calc(56px + env(safe-area-inset-bottom));transition:background .5s ease;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 16px 40px}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  .display{font-family:"Bricolage Grotesque",sans-serif}

  header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
  .brand h1{font-family:"Bricolage Grotesque";font-weight:800;letter-spacing:-.035em;font-size:clamp(27px,6.4vw,42px);line-height:.96;margin:0}
  .brand h1 .g{background:linear-gradient(105deg,var(--pravin),var(--swetha));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .brand p{margin:7px 0 0;color:var(--muted);font-size:13px;max-width:44ch}
  .rightcol{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
  .monthnav{display:flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--sh-1)}
  .monthnav button{border:0;background:transparent;cursor:pointer;color:var(--ink);width:32px;height:32px;border-radius:999px;font-size:17px;display:grid;place-items:center;transition:.15s}
  .monthnav button:hover{background:var(--surface-2)}
  .monthnav .label{font-family:"Bricolage Grotesque";font-weight:700;padding:0 8px;font-size:14px;min-width:104px;text-align:center;letter-spacing:.01em}
  .datepick{border:0;background:transparent;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:14px;color:var(--ink);padding:2px 6px;border-radius:8px;cursor:pointer;min-width:132px;text-align:center}
  .datepick:focus{outline:2px solid var(--accent);outline-offset:1px}
  .datepick::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6}
  .status{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:5px 11px;border-radius:999px;box-shadow:var(--sh-1)}
  .status .led{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none;transition:.3s}
  .status.ok .led{background:#2FA36B;box-shadow:0 0 0 3px rgba(47,163,107,.16)}
  .status.wait .led{background:#E0912A;box-shadow:0 0 0 3px rgba(224,145,42,.16)}
  .status.local .led{background:#8A909A}

  .tabs{display:flex;gap:5px;background:color-mix(in srgb,var(--surface) 82%, transparent);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:22px;box-shadow:var(--sh-1);position:sticky;top:8px;z-index:40;backdrop-filter:blur(10px) saturate(1.3)}
  .tab{flex:1;border:0;background:transparent;cursor:pointer;padding:10px 8px;border-radius:999px;font-family:"Bricolage Grotesque";font-weight:700;font-size:14.5px;color:var(--muted);letter-spacing:-.01em;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
  .tab .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .tab[data-who="pravin"] .dot{background:var(--pravin)}
  .tab[data-who="swetha"] .dot{background:var(--swetha)}
  .tab[data-who="both"] .dot{background:conic-gradient(from 210deg,var(--pravin),var(--swetha),var(--pravin))}
  .tab.active{color:#fff;box-shadow:0 6px 16px -7px rgba(16,20,28,.55)}
  .tab.active[data-who="pravin"]{background:linear-gradient(105deg,var(--pravin),var(--pravin-deep))}
  .tab.active[data-who="swetha"]{background:linear-gradient(105deg,var(--swetha),var(--swetha-deep))}
  .tab.active[data-who="both"]{background:linear-gradient(105deg,var(--pravin),var(--swetha))}
  .tab .dot{width:11px;height:11px}
  .tab.active .dot{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.28)}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 13px}
  .sec-name{--c:#888;font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
  .sec-name::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--c)}
  .mini-edit{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);font-family:"Inter";font-weight:600;font-size:13px;padding:7px 12px;border-radius:10px;cursor:pointer;transition:.15s;box-shadow:var(--sh-1);white-space:nowrap}
  .mini-edit:hover{background:var(--surface-2);border-color:var(--accent);color:var(--accent-deep)}
  .mini-edit:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .eyebrow{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.17em;text-transform:uppercase;color:var(--muted);margin:0 0 13px;display:flex;align-items:center;gap:11px}
  .eyebrow::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line-2),transparent)}
  section{margin-bottom:30px}

  .today-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px;gap:10px}
  .today-head .date{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(21px,4.6vw,27px);letter-spacing:-.025em}
  .today-head .date span{background:linear-gradient(100deg,var(--accent),var(--accent-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .today-head .prog{font-size:13px;color:var(--muted);white-space:nowrap}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:11px}
  .card{--c:#888;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;text-align:left;box-shadow:var(--sh-2);position:relative;overflow:hidden;transition:transform .13s cubic-bezier(.2,.7,.2,1), box-shadow .2s, background .2s, border-color .2s;-webkit-tap-highlight-color:transparent}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);opacity:.32;transition:opacity .2s}
  .card:hover{box-shadow:var(--sh-3);border-color:var(--line-2)}
  .card:active{transform:scale(.98)}
  .card:focus-visible{outline:2px solid var(--c);outline-offset:2px}
  .card.done{background:color-mix(in srgb,var(--c) 12%,var(--surface));border-color:transparent}
  .card.done::before{opacity:1}
  .check{width:31px;height:31px;border-radius:10px;flex:none;display:grid;place-items:center;border:2px solid var(--line-2);color:#fff;background:var(--surface);transition:.2s}
  .card.done .check{background:var(--c);border-color:var(--c);box-shadow:0 4px 12px -3px color-mix(in srgb,var(--c) 60%,transparent)}
  .check svg{width:17px;height:17px;opacity:0;transform:scale(.4) rotate(-8deg);transition:.24s cubic-bezier(.2,.9,.2,1.3)}
  .card.done .check svg{opacity:1;transform:none}
  .card .body{min-width:0;flex:1}
  .card .name{font-weight:600;font-size:15px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .streak{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px}
  .card.done .streak{color:color-mix(in srgb,var(--c) 78%,#000)}
  .flame{width:12px;height:13px;flex:none}
  .empty-note{grid-column:1/-1;color:var(--muted);font-size:14px;padding:20px;text-align:center;border:1px dashed var(--line-2);border-radius:var(--r);background:var(--surface-2)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh-2);position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;left:17px;bottom:14px;width:26px;height:3px;border-radius:9px;background:linear-gradient(90deg,var(--accent),var(--accent-deep))}
  .stat .k{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(27px,6.6vw,36px);letter-spacing:-.035em;line-height:1}
  .stat .k small{font-size:15px;color:var(--muted);font-weight:600;margin-left:1px}
  .stat .l{font-size:12px;color:var(--muted);margin-top:16px;font-weight:500}

  .gridwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);overflow:hidden}
  .scroller{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.grid{border-collapse:separate;border-spacing:0;width:100%}
  table.grid th,table.grid td{padding:0;text-align:center}
  thead th{position:sticky;top:0;z-index:5;background:var(--surface);font-family:"IBM Plex Mono";font-size:11px;font-weight:500;color:var(--muted);height:36px;min-width:30px;border-bottom:1px solid var(--line-2)}
  thead th.today{color:var(--accent-deep);font-weight:600}
  thead th.today::after{content:"";display:block;height:2px;margin:3px 7px 0;border-radius:9px;background:var(--accent)}
  th.habitcol,td.habitcol{position:sticky;left:0;z-index:6;background:var(--surface);text-align:left;min-width:136px;max-width:136px;padding:0 12px;border-right:1px solid var(--line-2)}
  thead th.habitcol{z-index:7}
  td.habitcol{font-size:13px;font-weight:500;height:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
  td.habitcol .swatch{width:9px;height:9px;border-radius:50%;flex:none}
  th.countcol,td.countcol{position:sticky;right:0;z-index:6;background:var(--surface-2);min-width:46px;border-left:1px solid var(--line-2);font-family:"IBM Plex Mono";font-weight:600;font-size:13px}
  thead th.countcol{z-index:7;color:var(--muted)}
  tbody td{height:40px;border-bottom:1px solid var(--line)}
  td.day{min-width:30px}
  td.day.col-today{background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
  .cell{--c:#888;position:relative;width:23px;height:23px;margin:auto;border-radius:8px;border:1.5px solid var(--line-2);background:var(--surface);cursor:pointer;padding:0;display:block;transition:background .13s,border-color .13s,border-radius .13s,width .13s,margin .13s;-webkit-tap-highlight-color:transparent}
  .cell.sk{background:var(--surface-2);border-color:var(--line-2)}
  .cell.sk::after{content:"";position:absolute;left:5px;right:5px;top:50%;height:2px;border-radius:2px;background:var(--muted);transform:translateY(-50%)}
  .cell:hover{border-color:var(--c)}
  .cell.on{background:var(--c);border-color:var(--c)}
  .cell.on.lnkL{border-top-left-radius:2px;border-bottom-left-radius:2px;margin-left:-4px;width:27px}
  .cell.on.lnkR{border-top-right-radius:2px;border-bottom-right-radius:2px;margin-right:-4px;width:27px}
  .cell.on.lnkL.lnkR{width:31px}
  .cell:focus-visible{outline:2px solid var(--c);outline-offset:2px}
  tfoot td{height:36px;background:var(--surface-2);border-top:1px solid var(--line-2);font-family:"IBM Plex Mono";font-size:11px;font-weight:600;color:var(--muted)}
  tfoot td.total-on{color:var(--accent-deep)}
  tfoot td.habitcol{font-family:"Inter";font-size:11px;text-transform:uppercase;letter-spacing:.09em}
  .gridhint{padding:12px 15px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
  /* today card: rest-day (skip) state */
  .card.skip{background:var(--surface-2);border-color:var(--line);opacity:.9}
  .card.skip::before{opacity:.35;background:var(--muted)}
  .card.skip .check{background:var(--surface);border-color:var(--line-2);color:var(--muted)}
  .card.skip .check svg{opacity:1;transform:none}
  .card .streak.rest{color:var(--muted)}
  /* today note */
  .noterow{margin-top:11px}
  .noterow textarea{width:100%;min-height:52px;resize:vertical;border:1px solid var(--line);border-radius:14px;background:var(--surface);
    padding:12px 14px;font-family:"Inter";font-size:14px;color:var(--ink);box-shadow:var(--sh-1)}
  .noterow textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .noterow .nlabel{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  /* day-header note button */
  thead th .dnum{border:0;background:transparent;font:inherit;color:inherit;cursor:pointer;padding:2px 4px;border-radius:6px;position:relative}
  thead th .dnum:hover{background:var(--surface-2)}
  thead th .dnum.hasnote::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
  /* cadence picker */
  .freqbtn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-family:"IBM Plex Mono";font-size:11px;font-weight:500;
    padding:5px 9px;border-radius:8px;cursor:pointer;flex:none;white-space:nowrap}
  .freqbtn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .freqpanel{display:none;gap:6px;padding:11px 12px;flex-wrap:wrap;background:var(--surface-2);border-bottom:1px solid var(--line);align-items:center}
  .freqpanel.open{display:flex}
  .freqpanel .fq{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);font-family:"Inter";font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer}
  .freqpanel .fq.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .freqpanel .flbl{font-size:12px;color:var(--muted);width:100%;margin-bottom:2px}
  /* note modal */
  .modal-bg{position:fixed;inset:0;background:rgba(16,20,28,.42);backdrop-filter:blur(2px);display:none;place-items:center;z-index:100;padding:20px}
  .modal-bg.open{display:grid}
  .modal{background:var(--surface);border-radius:20px;box-shadow:0 24px 60px -18px rgba(0,0,0,.5);max-width:440px;width:100%;padding:20px;border:1px solid var(--line)}
  .modal h4{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;margin:0 0 3px;letter-spacing:-.02em}
  .modal .msub{font-size:12px;color:var(--muted);margin-bottom:13px}
  .modal textarea{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line-2);border-radius:13px;padding:12px 14px;font-family:"Inter";font-size:14px;background:var(--surface-2)}
  .modal textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .modal .mrow{display:flex;justify-content:flex-end;gap:9px;margin-top:14px}
  /* coach recent notes */
  .noteslist{margin-top:15px;border-top:1px solid var(--line);padding-top:13px}
  .noteslist .nl-h{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .noteslist .nl{font-size:13px;line-height:1.5;margin-bottom:9px;display:flex;gap:9px}
  .noteslist .nl .dd{font-family:"IBM Plex Mono";font-size:11px;color:var(--muted);flex:none;padding-top:1px;min-width:34px}
  .noteslist .nl .bd{color:var(--ink-2)}
  .noteslist .nl-empty{font-size:12.5px;color:var(--muted)}
  .dchips{display:flex;flex-wrap:wrap;gap:6px}
  .dchip{--c:#888;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:var(--surface)}
  .dchip.done{background:var(--c);border-color:transparent;color:#fff}
  .dchip.skip{border-style:dashed;color:var(--ink-2)}
  .dchip.miss{opacity:.65}
  /* sub navigation (sections within a person) */
  .subnav{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:20px}
  .subtab{flex:1;border:0;background:transparent;cursor:pointer;padding:9px 6px;border-radius:10px;font-family:"Inter";font-weight:600;font-size:13.5px;color:var(--muted);transition:.15s}
  .subtab:hover{color:var(--ink)}
  .subtab.active{background:var(--surface);color:var(--accent-deep);box-shadow:var(--sh-1)}
  .subtab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* quick cards on Today */
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);padding:14px 15px}
  .qlabel{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .qcard .winput{margin:0}
  /* food */
  .foodadd{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .foodadd input[type=time]{border:1px solid var(--line-2);border-radius:11px;padding:9px 11px;font-family:"IBM Plex Mono";font-size:13px;background:var(--surface);color:var(--ink);flex:none}
  .foodadd input[type=text]{flex:1;min-width:120px;border:1px solid var(--line-2);border-radius:11px;padding:10px 13px;font-family:"Inter";font-size:14px;background:var(--surface)}
  .foodadd input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .meals{display:flex;flex-direction:column;gap:2px}
  .meal{display:flex;align-items:center;gap:11px;padding:8px 2px;border-bottom:1px solid var(--line)}
  .meal:last-child{border-bottom:0}
  .meal .mtime{font-family:"IBM Plex Mono";font-size:12px;color:var(--muted);flex:none;min-width:44px}
  .meal .mitem{flex:1;font-size:14px;color:var(--ink)}
  .meal .mdel{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;width:26px;height:26px;border-radius:7px;flex:none}
  .meal .mdel:hover{background:#F7DFE4;color:var(--swetha-deep)}
  .meal-empty{font-size:13px;color:var(--muted);padding:6px 2px}
  .mealday{margin-top:16px}
  .mealday .mday-h{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;padding-top:12px;border-top:1px solid var(--line-2)}
  @media (max-width:560px){ .qgrid{grid-template-columns:1fr} }
  /* weight */
  .wcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);padding:16px 17px}
  .whead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:4px;flex-wrap:wrap}
  .wnow{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(24px,5vw,30px);letter-spacing:-.03em;line-height:1}
  .wnow small{font-size:14px;color:var(--muted);font-weight:600;margin-left:2px}
  .wdelta{font-family:"IBM Plex Mono";font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--muted)}
  .wdelta.down{color:#1f8f5b;background:color-mix(in srgb,#2FA36B 14%,#fff)}
  .wdelta.up{color:#c0562e;background:color-mix(in srgb,#F0714E 15%,#fff)}
  .winput{display:flex;align-items:center;gap:8px;margin:12px 0 4px}
  .winput label{font-size:13px;color:var(--muted);font-weight:500}
  .winput .ibox{position:relative;flex:none}

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";

  /* ============================================================
     1)  CONFIG  —  paste your Supabase project details here.
         Leave blank to run local-only (no sync).
     ============================================================ */
  var CONFIG = {
    SUPABASE_URL: "https://gjrtmaobnotlczjdimfm.supabase.co",
    SUPABASE_ANON_KEY: "sb_publishable_8F0wcw89qfhic99SGwCw9w_wGpeSl7J"
  };

  var PALETTE = ["#5B6EE1","#12A5A0","#E0912A","#DD5A86","#2FA36B","#8B5CF6","#F0714E","#159ED4","#7BAE2F","#B0568E"];
  var SEED=[["No phone","#5B6EE1"],["Get sunlight","#E0912A"],["Drink 500ml water","#159ED4"]];

  var CKEY="pravinSwethaHabits.cache.v2", OKEY="pravinSwethaHabits.outbox.v2", mem={};
  function lget(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return mem[k]||null;}}
  function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){mem[k]=v;}}
  function uid(){return Math.random().toString(36).slice(2,10);}
  function seedHabits(){return SEED.map(function(s,i){return {id:uid(),label:s[0],color:s[1],sort:i};});}

  var state = lget(CKEY) || {names:{pravin:"Pravin",swetha:"Swetha"},habits:{pravin:seedHabits(),swetha:seedHabits()},logs:{},notes:{}};
  if(!state.names) state.names={pravin:"Pravin",swetha:"Swetha"};
  if(!state.logs) state.logs={};
  if(!state.notes) state.notes={};
  if(!state.weights) state.weights={};
  if(!state.meals) state.meals={};
  // migrate old boolean logs (true) -> "done"
  Object.keys(state.logs).forEach(function(k){ if(state.logs[k]===true) state.logs[k]="done"; });
  ["pravin","swetha"].forEach(function(w){
    if(!state.habits[w]||!state.habits[w].length) state.habits[w]=seedHabits();
    if(!state.names[w]) state.names[w]=w[0].toUpperCase()+w.slice(1);
    state.habits[w].forEach(function(h){ if(typeof h.week==="undefined") h.week=0; }); // 0 = daily
  });
  var outbox = lget(OKEY) || [];
  function saveCache(){lset(CKEY,state);}
  function saveOutbox(){lset(OKEY,outbox);}

  var supa=null, cloud=false, localReason="Local only";
  function setStatus(kind,txt){var el=document.getElementById("status");el.className="status "+kind;document.getElementById("statusTxt").textContent=txt;}

  var now=new Date(), view={y:now.getFullYear(),m:now.getMonth()};
  var selDay=now.getDate();  // selected day-of-month; the daily views operate on this
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  function ymKey(){return view.y+"-"+(view.m+1);}
  function daysIn(y,m){return new Date(y,m+1,0).getDate();}
  function isThisMonth(){return view.y===now.getFullYear()&&view.m===now.getMonth();}
  function todayDate(){return now.getDate();}
  function pad2(n){return (n<10?"0":"")+n;}
  function selISO(){return view.y+"-"+pad2(view.m+1)+"-"+pad2(selDay);}
  function isSelToday(){return isThisMonth()&&selDay===now.getDate();}
  function setSelFromDate(dt){ view.y=dt.getFullYear(); view.m=dt.getMonth(); selDay=dt.getDate(); }
  function stepSel(delta){ setSelFromDate(new Date(view.y,view.m,selDay+delta)); }

  function lk(hid,day){return hid+"|"+ymKey()+"|"+day;}
  function cellState(hid,day){return state.logs[lk(hid,day)]||null;} // "done" | "skip" | null
  function isDone(hid,day){return cellState(hid,day)==="done";}
  function isSkip(hid,day){return cellState(hid,day)==="skip";}
  function setCell(who,hid,day,val){ // val: "done" | "skip" | null
    var key=lk(hid,day);
    if(val) state.logs[key]=val; else delete state.logs[key];
    enqueue({k:"log",person:who,hid:hid,ym:ymKey(),day:day,state:val}); saveCache();
  }
  function tapCell(who,hid,day){ setCell(who,hid,day, isDone(hid,day)?null:"done"); }      // tap: toggle done
  function skipCell(who,hid,day){ setCell(who,hid,day, isSkip(hid,day)?null:"skip"); }      // long-press: toggle rest

  // notes (per person, per day)
  function nk(who,day){return who+"|"+ymKey()+"|"+day;}
  function getNote(who,day){return state.notes[nk(who,day)]||"";}
  function setNote(who,day,body){
    body=(body||"").trim();
    if(body) state.notes[nk(who,day)]=body; else delete state.notes[nk(who,day)];
    enqueue({k:"note",person:who,ym:ymKey(),day:day,body:body}); saveCache();
  }

  // weight (kg, per person, per day)
  function wtk(who,day){return who+"|"+ymKey()+"|"+day;}
  function getWeight(who,day){var v=state.weights[wtk(who,day)];return (v||v===0)?v:null;}
  function setWeight(who,day,kg){
    var key=wtk(who,day);
    if(kg==null||kg==="") delete state.weights[key]; else state.weights[key]=+kg;
    enqueue({k:"weight",person:who,ym:ymKey(),day:day,kg:(kg==null||kg==="")?null:+kg}); saveCache();
  }
  function weightSeries(who){
    var dim=daysIn(view.y,view.m),pts=[];
    for(var d=1;d<=dim;d++){var v=getWeight(who,d);if(v!=null)pts.push({x:d,y:v});}
    return pts;
  }
  function latestWeight(who){var s=weightSeries(who);return s.length?s[s.length-1]:null;}

  // meals (food log): flat store keyed by id
  function nowHM(){var d=new Date();return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
  function mealsFor(who,day){
    var arr=[]; for(var id in state.meals){var m=state.meals[id]; if(m.person===who&&m.ym===ymKey()&&m.day===day) arr.push({id:id,at:m.at||"",item:m.item,sort:(m.sort||0)});}
    arr.sort(function(a,b){ var d=(a.sort||0)-(b.sort||0); return d!==0?d:(a.at||"").localeCompare(b.at||""); });
    return arr;
  }
  function mealDays(who){
    var set={}; for(var id in state.meals){var m=state.meals[id]; if(m.person===who&&m.ym===ymKey()) set[m.day]=1;}
    return Object.keys(set).map(Number).sort(function(a,b){return b-a;});
  }
  function mealCount(who,day){var n=0;for(var id in state.meals){var m=state.meals[id];if(m.person===who&&m.ym===ymKey()&&m.day===day)n++;}return n;}
  function addMeal(who,day,at,item){
    item=(item||"").trim(); if(!item) return;
    var mx=0; for(var k in state.meals){var mm=state.meals[k]; if(mm.person===who&&mm.ym===ymKey()&&mm.day===day&&(mm.sort||0)>mx) mx=(mm.sort||0);}
    var srt=mx+1, id=uid();
    state.meals[id]={person:who,ym:ymKey(),day:day,at:at||"",item:item,sort:srt};
    enqueue({k:"mealAdd",id:id,person:who,ym:ymKey(),day:day,at:at||"",item:item,sort:srt}); saveCache();
  }
  function delMeal(id){ if(state.meals[id]){ delete state.meals[id]; enqueue({k:"mealDel",id:id}); saveCache(); } }

  function habitCount(hid){var pre=hid+"|"+ymKey()+"|",n=0;for(var k in state.logs){if(k.indexOf(pre)===0&&state.logs[k]==="done")n++;}return n;}
  function skipCount(hid){var pre=hid+"|"+ymKey()+"|",n=0;for(var k in state.logs){if(k.indexOf(pre)===0&&state.logs[k]==="skip")n++;}return n;}
  function dayTotal(who,day){var n=0;state.habits[who].forEach(function(h){if(isDone(h.id,day))n++;});return n;}
  function activeDays(who){var dim=daysIn(view.y,view.m),n=0;for(var d=1;d<=dim;d++){if(dayTotal(who,d)>0)n++;}return n;}
  // streak: skips are neutral (don't break, don't add); misses break it
  function currentStreak(who,hid){
    var end=selDay,s=0;
    for(var d=end;d>=1;d--){ if(isDone(hid,d)) s++; else if(isSkip(hid,d)) continue; else break; }
    return s;
  }
  function bestStreak(who){
    var dim=daysIn(view.y,view.m),best=0;
    state.habits[who].forEach(function(h){var r=0;for(var d=1;d<=dim;d++){ if(isDone(h.id,d)){r++;if(r>best)best=r;} else if(isSkip(h.id,d)){} else r=0; }});
    return best;
  }
  // weekly helpers (Mon–Sun window containing "day", clipped to month)
  function weekWindow(day){
    var dim=daysIn(view.y,view.m), dow=(new Date(view.y,view.m,day).getDay()+6)%7; // 0=Mon
    var start=Math.max(1,day-dow), end=Math.min(dim,start+6);
    return [start,end];
  }
  function doneInRange(hid,a,b){var n=0;for(var d=a;d<=b;d++)if(isDone(hid,d))n++;return n;}
  function thisWeekDone(hid){ var w=weekWindow(selDay); return doneInRange(hid,w[0],w[1]); }
  // per-habit consistency (0..1), target-aware, excluding skipped days
  function habitConsistency(who,hb,elapsed){
    if(hb.week>0){ // weekly target
      var dim=daysIn(view.y,view.m), refEnd=isThisMonth()?todayDate():dim;
      var weeksElapsed=Math.max(1,Math.ceil(refEnd/7)); var expected=hb.week*weeksElapsed;
      return expected? Math.min(1, habitCount(hb.id)/expected) : 0;
    }
    var denom=Math.max(1, elapsed - skipCount(hb.id)); // daily: exclude rest days
    return Math.min(1, habitCount(hb.id)/denom);
  }

  function enqueue(op){ if(!cloud)return; outbox.push(op); saveOutbox(); flush(); }
  var flushing=false;
  function flush(){
    if(!cloud||flushing) return;
    if(!navigator.onLine){ setStatus("wait","Offline — will sync"); return; }
    flushing=true; setStatus("wait","Syncing…");
    (function step(){
      if(!outbox.length){ flushing=false; setStatus("ok","Synced"); return; }
      applyOp(outbox[0]).then(function(){ outbox.shift(); saveOutbox(); step(); })
        .catch(function(){ flushing=false; setStatus("wait","Retrying soon"); });
    })();
  }
  function rawOp(op){
    if(op.k==="log"){
      if(op.state) return supa.from("logs").upsert({habit_id:op.hid,ym:op.ym,day:op.day,state:op.state},{onConflict:"habit_id,ym,day"});
      return supa.from("logs").delete().match({habit_id:op.hid,ym:op.ym,day:op.day});
    }
    if(op.k==="note"){
      if(op.body) return supa.from("notes").upsert({person:op.person,ym:op.ym,day:op.day,body:op.body},{onConflict:"person,ym,day"});
      return supa.from("notes").delete().match({person:op.person,ym:op.ym,day:op.day});
    }
    if(op.k==="weight"){
      if(op.kg!=null) return supa.from("weights").upsert({person:op.person,ym:op.ym,day:op.day,kg:op.kg},{onConflict:"person,ym,day"});
      return supa.from("weights").delete().match({person:op.person,ym:op.ym,day:op.day});
    }
    if(op.k==="mealAdd") return supa.from("meals").insert({id:op.id,person:op.person,ym:op.ym,day:op.day,at:op.at,item:op.item,sort:op.sort||0});
    if(op.k==="mealDel") return supa.from("meals").delete().eq("id",op.id);
    if(op.k==="mealSort") return supa.from("meals").update({sort:op.sort}).eq("id",op.id);
    if(op.k==="habitAdd") return supa.from("habits").insert({id:op.id,person:op.person,label:op.label,color:op.color,sort:op.sort,week:op.week||0});
    if(op.k==="habitRename") return supa.from("habits").update({label:op.label}).eq("id",op.id);
    if(op.k==="habitColor") return supa.from("habits").update({color:op.color}).eq("id",op.id);
    if(op.k==="habitFreq") return supa.from("habits").update({week:op.week}).eq("id",op.id);
    if(op.k==="habitSort") return supa.from("habits").update({sort:op.sort}).eq("id",op.id);
    if(op.k==="habitDel") return supa.from("habits").delete().eq("id",op.id);
    if(op.k==="person") return supa.from("people").upsert({person:op.person,display_name:op.name},{onConflict:"person"});
    return Promise.resolve({});
  }
  function applyOp(op){ return Promise.resolve(rawOp(op)).then(function(r){ if(r&&r.error) throw r.error; return r; }); }

  function pull(){
    if(!cloud) return;
    if(!navigator.onLine){ setStatus("wait","Offline"); return; }
    Promise.all([supa.from("people").select("*"),supa.from("habits").select("*"),supa.from("logs").select("*"),supa.from("notes").select("*"),supa.from("weights").select("*"),supa.from("meals").select("*")])
    .then(function(r){
      if(r[0].error||r[1].error||r[2].error||r[3].error||r[4].error||r[5].error) throw (r[0].error||r[1].error||r[2].error||r[3].error||r[4].error||r[5].error);
      var ppl=r[0].data||[], hbs=r[1].data||[], lgs=r[2].data||[], nts=r[3].data||[], wts=r[4].data||[], mls=r[5].data||[];
      var fresh={names:{pravin:"Pravin",swetha:"Swetha"},habits:{pravin:[],swetha:[]},logs:{},notes:{},weights:{},meals:{}};
      ppl.forEach(function(p){ if(fresh.names[p.person]!==undefined) fresh.names[p.person]=p.display_name; });
      hbs.forEach(function(h){ if(fresh.habits[h.person]) fresh.habits[h.person].push({id:h.id,label:h.label,color:h.color||"#888",sort:h.sort||0,week:h.week||0}); });
      ["pravin","swetha"].forEach(function(w){ fresh.habits[w].sort(function(a,b){return a.sort-b.sort;}); if(!cloud && !fresh.habits[w].length) fresh.habits[w]=seedHabits(); });
      lgs.forEach(function(l){ fresh.logs[l.habit_id+"|"+l.ym+"|"+l.day]=l.state||"done"; });
      nts.forEach(function(n){ fresh.notes[n.person+"|"+n.ym+"|"+n.day]=n.body; });
      wts.forEach(function(x){ fresh.weights[x.person+"|"+x.ym+"|"+x.day]=x.kg; });
      mls.forEach(function(m){ fresh.meals[m.id]={person:m.person,ym:m.ym,day:m.day,at:m.at||"",item:m.item,sort:(m.sort||0)}; });
      outbox.forEach(function(op){ applyOpLocal(fresh,op); });
      ["pravin","swetha"].forEach(function(w){ fresh.habits[w].sort(function(a,b){return a.sort-b.sort;}); });
      state=fresh; saveCache(); render();
      setStatus(outbox.length?"wait":"ok", outbox.length?"Syncing…":"Synced"); flush();
    }).catch(function(){ setStatus("wait","Connection issue"); });
  }
  function applyOpLocal(s,op){
    if(op.k==="log"){var key=op.hid+"|"+op.ym+"|"+op.day;if(op.state)s.logs[key]=op.state;else delete s.logs[key];}
    else if(op.k==="note"){var nkey=op.person+"|"+op.ym+"|"+op.day;if(op.body)s.notes[nkey]=op.body;else delete s.notes[nkey];}
    else if(op.k==="weight"){var wkey=op.person+"|"+op.ym+"|"+op.day;if(op.kg!=null)s.weights[wkey]=op.kg;else delete s.weights[wkey];}
    else if(op.k==="mealAdd"){ if(!s.meals)s.meals={}; s.meals[op.id]={person:op.person,ym:op.ym,day:op.day,at:op.at,item:op.item,sort:op.sort||0}; }
    else if(op.k==="mealDel"){ if(s.meals) delete s.meals[op.id]; }
    else if(op.k==="mealSort"){ if(s.meals&&s.meals[op.id]) s.meals[op.id].sort=op.sort; }
    else if(op.k==="habitAdd"){if(s.habits[op.person])s.habits[op.person].push({id:op.id,label:op.label,color:op.color,sort:op.sort,week:op.week||0});}
    else if(op.k==="habitRename"){eachHabit(s,function(h){if(h.id===op.id)h.label=op.label;});}
    else if(op.k==="habitColor"){eachHabit(s,function(h){if(h.id===op.id)h.color=op.color;});}
    else if(op.k==="habitFreq"){eachHabit(s,function(h){if(h.id===op.id)h.week=op.week;});}
    else if(op.k==="habitSort"){eachHabit(s,function(h){if(h.id===op.id)h.sort=op.sort;});["pravin","swetha"].forEach(function(w){s.habits[w].sort(function(a,b){return a.sort-b.sort;});});}
    else if(op.k==="habitDel"){["pravin","swetha"].forEach(function(w){s.habits[w]=s.habits[w].filter(function(h){return h.id!==op.id;});});}
    else if(op.k==="person"){if(s.names[op.person]!==undefined)s.names[op.person]=op.name;}
  }

  // Dependency-free SVG line chart. series=[{name,color,points:[{x,y}]}], dim=days in month.
  function weightChart(series,dim){
    var all=[]; series.forEach(function(s){s.points.forEach(function(p){all.push(p.y);});});
    if(!all.length) return "";
    var yMin=Math.min.apply(null,all), yMax=Math.max.apply(null,all);
    if(yMin===yMax){ yMin-=1; yMax+=1; } else { var pad=(yMax-yMin)*0.15; yMin-=pad; yMax+=pad; }
    var W=340,H=190,ml=32,mr=10,mt=12,mb=20, pw=W-ml-mr, ph=H-mt-mb;
    var xEnd=Math.max(dim,2);
    function X(d){return ml+(d-1)/(xEnd-1)*pw;}
    function Y(v){return mt+(yMax-v)/(yMax-yMin)*ph;}
    var svg='<svg viewBox="0 0 '+W+' '+H+'" class="wchart" preserveAspectRatio="none" role="img">';
    // gridlines + y labels (3)
    for(var g=0;g<=2;g++){
      var v=yMin+(yMax-yMin)*g/2, y=Y(v);
      svg+='<line x1="'+ml+'" y1="'+y.toFixed(1)+'" x2="'+(W-mr)+'" y2="'+y.toFixed(1)+'" class="wgrid"/>';
      svg+='<text x="'+(ml-5)+'" y="'+(y+3).toFixed(1)+'" class="wylab">'+v.toFixed(1)+'</text>';
    }
    // x labels: 1, mid, last
    [1,Math.round(xEnd/2),xEnd].forEach(function(d){ svg+='<text x="'+X(d).toFixed(1)+'" y="'+(H-6)+'" class="wxlab">'+d+'</text>'; });
    // series
    series.forEach(function(s){
      if(!s.points.length) return;
      var dstr=s.points.map(function(p,i){return (i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.y).toFixed(1);}).join(' ');
      svg+='<path d="'+dstr+'" fill="none" stroke="'+s.color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" class="wline"/>';
      s.points.forEach(function(p){ svg+='<circle cx="'+X(p.x).toFixed(1)+'" cy="'+Y(p.y).toFixed(1)+'" r="3" fill="#fff" stroke="'+s.color+'" stroke-width="2"/>'; });
    });
    svg+='</svg>';
    return svg;
  }

    h.push('</div></section>');
    // selected-day snapshot for both
    var selL=DOW[selDate().getDay()]+' '+selDay+' '+MONTHS[view.m].slice(0,3)+' '+view.y+(isSelToday()?' · today':'');
    h.push('<section><h2 class="eyebrow">Selected day · '+selL+'</h2><div class="duo">');
    ["pravin","swetha"].forEach(function(who){
      var pc2=who==="swetha"?"var(--swetha)":"var(--pravin)", hbs=state.habits[who];
      var doneN=hbs.filter(function(x){return isDone(x.id,selDay);}).length;
      var wt=getWeight(who,selDay), note=getNote(who,selDay);
      var chips=hbs.length?hbs.map(function(hb){var stt=isDone(hb.id,selDay)?'done':(isSkip(hb.id,selDay)?'skip':'miss');return '<span class="dchip '+stt+'" style="--c:'+hb.color+'">'+esc(hb.label)+'</span>';}).join(""):'<span class="nl-empty">No habits</span>';
      h.push('<div class="panel" style="--pc:'+pc2+'"><h3>'+esc(state.names[who])+'</h3><div class="sub">'+doneN+'/'+hbs.length+' habits · '+(wt!=null?wt.toFixed(1)+' kg':'no weight')+'</div>');
      h.push('<div class="dchips">'+chips+'</div>');
      h.push('<div class="nl-h" style="margin-top:15px">Meals</div><div class="meals">'+mealItems(who,selDay,false)+'</div>');
      if(note) h.push('<div class="noteslist"><div class="nl-h">Note</div><div class="nl"><span class="bd">'+esc(note)+'</span></div></div>');
      h.push('</div>');
    });
    h.push('</div></section>');
    h.push('<div class="toolrow">');
    h.push(cloud?'<button class="btn" id="refresh">↻ Refresh</button>':'<button class="btn" id="backup">↓ Back up</button><button class="btn" id="restore">↑ Restore</button>');
    h.push('</div>');
    app.innerHTML=h.join("");
    var rf=document.getElementById("refresh"); if(rf)rf.onclick=pull;
    var b=document.getElementById("backup"),r=document.getElementById("restore"); if(b)b.onclick=doBackup; if(r)r.onclick=doRestore;
  }

  function press(el,onTap,onLong){
    var timer=null,longed=false,lock=false;
    function fireLong(){ if(lock)return; lock=true; longed=true; setTimeout(function(){lock=false;},600); setTimeout(function(){longed=false;},750); onLong(); }
    el.addEventListener("click",function(){ if(longed){longed=false;return;} onTap(); });
    el.addEventListener("contextmenu",function(e){ e.preventDefault(); fireLong(); });
    el.addEventListener("touchstart",function(){ if(timer)clearTimeout(timer); timer=setTimeout(function(){ if(navigator.vibrate)navigator.vibrate(15); fireLong(); },500); },{passive:true});
    ["touchend","touchmove","touchcancel"].forEach(function(ev){ el.addEventListener(ev,function(){ if(timer){clearTimeout(timer);timer=null;} }); });
  }

  var nmWho=null,nmDay=null;
  function openNote(who,day){
    nmWho=who; nmDay=day;
    document.getElementById("nmTitle").textContent="Note · "+day+" "+MONTHS[view.m].slice(0,3);
    document.getElementById("nmSub").textContent=state.names[who]+" · "+view.y;
    document.getElementById("nmText").value=getNote(who,day);
    document.getElementById("noteModal").classList.add("open");
    setTimeout(function(){document.getElementById("nmText").focus();},50);
  }
  function closeNote(){document.getElementById("noteModal").classList.remove("open");}
  (function setupModal(){
    document.getElementById("nmCancel").onclick=closeNote;
    document.getElementById("nmSave").onclick=function(){ if(nmWho!=null){ setNote(nmWho,nmDay,document.getElementById("nmText").value); } closeNote(); render(); };
    document.getElementById("noteModal").addEventListener("click",function(e){ if(e.target.id==="noteModal") closeNote(); });
  })();

  function wireProfile(who){
    app.querySelectorAll("[data-sec]").forEach(function(el){ el.onclick=function(){ section=el.dataset.sec; render(); window.scrollTo(0,0); }; });
    app.querySelectorAll("[data-today]").forEach(function(el){
      press(el, function(){ tapCell(who,el.dataset.today,selDay); render(); },
                function(){ skipCell(who,el.dataset.today,selDay); render(); });
    });
    app.querySelectorAll("[data-cell]").forEach(function(el){
      var p=el.dataset.cell.split("|"), hid=p[0], day=+p[1];
      press(el, function(){ tapCell(who,hid,day); render(); },
                function(){ skipCell(who,hid,day); render(); });
    });
    app.querySelectorAll("[data-note]").forEach(function(el){ el.onclick=function(){ openNote(who,+el.dataset.note); }; });
    // meals
    var mAdd=document.getElementById("mealAdd"), mTime=document.getElementById("mealTime"), mItem=document.getElementById("mealItem");
    function addM(){ if(!mItem)return; var v=mItem.value.trim(); if(!v)return; addMeal(who,selDay,mTime?mTime.value:nowHM(),v); render(); }
    if(mAdd) mAdd.onclick=addM;
    if(mItem) mItem.onkeydown=function(e){ if(e.key==="Enter") addM(); };
    app.querySelectorAll("[data-meal]").forEach(function(el){ el.onclick=function(){ delMeal(el.dataset.meal); render(); }; });
    var tn=document.getElementById("todayNote");
    if(tn) tn.addEventListener("change",function(){ setNote(who,selDay,tn.value); render(); });
    var wtI=document.getElementById("wtInput"), wtB=document.getElementById("wtSave");
    function saveWt(){ if(!wtI)return; var v=wtI.value.trim(); setWeight(who,selDay, v===""?null:parseFloat(v)); render(); toast(v===""?"Weight cleared":"Weight saved"); }
    if(wtB) wtB.onclick=saveWt;
    if(wtI) wtI.onkeydown=function(e){ if(e.key==="Enter") saveWt(); };
    app.querySelectorAll("[data-rename]").forEach(function(el){el.onchange=function(){var hb=find(who,el.dataset.rename);if(hb){hb.label=el.value.trim()||hb.label;enqueue({k:"habitRename",id:hb.id,label:hb.label});saveCache();render();}};});
    app.querySelectorAll("[data-color]").forEach(function(el){el.onclick=function(){var pal=app.querySelector('[data-pal="'+el.dataset.color+'"]');if(pal)pal.classList.toggle("open");};});
    app.querySelectorAll("[data-pick]").forEach(function(el){el.onclick=function(){var p=el.dataset.pick.split("|"),hb=find(who,p[0]);if(hb){hb.color=p[1];enqueue({k:"habitColor",id:hb.id,color:p[1]});saveCache();render();}};});
    app.querySelectorAll("[data-freq]").forEach(function(el){el.onclick=function(){var fp=app.querySelector('[data-fqp="'+el.dataset.freq+'"]');if(fp)fp.classList.toggle("open");};});
    app.querySelectorAll("[data-mmv]").forEach(function(el){el.onclick=function(){var p=el.dataset.mmv.split("|");moveMeal(who,+p[1],p[2],p[0]);};});
    app.querySelectorAll("[data-fq]").forEach(function(el){el.onclick=function(){var p=el.dataset.fq.split("|"),hb=find(who,p[0]);if(hb){hb.week=+p[1];enqueue({k:"habitFreq",id:hb.id,week:hb.week});saveCache();render();}};});
    app.querySelectorAll("[data-del]").forEach(function(el){el.onclick=function(){var hb=find(who,el.dataset.del);if(hb&&confirm('Remove "'+hb.label+'"? Its logged days will be cleared.')){state.habits[who]=state.habits[who].filter(function(x){return x.id!==hb.id;});var pre=hb.id+"|";Object.keys(state.logs).forEach(function(k){if(k.indexOf(pre)===0)delete state.logs[k];});enqueue({k:"habitDel",id:hb.id});saveCache();render();}};});
    var add=document.getElementById("addHabit"),inp=document.getElementById("newHabit");
    function addH(){var v=(inp.value||"").trim();if(!v)return;var color=PALETTE[state.habits[who].length%PALETTE.length],id=uid(),sort=state.habits[who].length;state.habits[who].push({id:id,label:v,color:color,sort:sort,week:0});enqueue({k:"habitAdd",person:who,id:id,label:v,color:color,sort:sort,week:0});inp.value="";saveCache();render();var n=document.getElementById("newHabit");if(n)n.focus();}
    if(add)add.onclick=addH; if(inp)inp.onkeydown=function(e){if(e.key==="Enter")addH();};
    var rp=document.getElementById("renameProfile");
    if(rp)rp.onclick=function(){var v=prompt("Name for this person:",state.names[who]);if(v&&v.trim()){state.names[who]=v.trim();enqueue({k:"person",person:who,name:v.trim()});saveCache();render();}};
    var rf=document.getElementById("refresh"); if(rf)rf.onclick=pull;
    var b=document.getElementById("backup"),r=document.getElementById("restore"); if(b)b.onclick=doBackup; if(r)r.onclick=doRestore;
  }
  function find(who,id){return state.habits[who].find(function(x){return x.id===id;});}
  function moveMeal(who,day,id,dir){
    var arr=mealsFor(who,day), i=-1;
    arr.forEach(function(x,k){ if(x.id===id) i=k; });
    if(i<0) return;
    var j=dir==="up"?i-1:i+1;
    if(j<0||j>=arr.length) return;
    var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
    arr.forEach(function(m,k){ var srt=k+1; if(state.meals[m.id]&&(state.meals[m.id].sort||0)!==srt){ state.meals[m.id].sort=srt; enqueue({k:"mealSort",id:m.id,sort:srt}); } });
    saveCache(); render();
  }

  function doBackup(){var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="habits-backup.json";document.body.appendChild(a);a.click();a.remove();toast("Backup downloaded");}
  function doRestore(){var inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json";inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var d=JSON.parse(rd.result);if(!d.habits||!d.logs)throw 0;if(!d.names)d.names={pravin:"Pravin",swetha:"Swetha"};if(!d.notes)d.notes={};if(!d.weights)d.weights={};if(!d.meals)d.meals={};Object.keys(d.logs).forEach(function(k){if(d.logs[k]===true)d.logs[k]="done";});state=d;saveCache();render();toast("Restored");}catch(e){toast("That file isn’t a valid backup");}};rd.readAsText(f);};inp.click();}

  var toastEl=document.getElementById("toast"),tT;
  function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(tT);tT=setTimeout(function(){toastEl.classList.remove("show");},2000);}

  document.querySelectorAll(".tab").forEach(function(t){t.onclick=function(){current=t.dataset.who;render();};});
  document.getElementById("prevD").onclick=function(){stepSel(-1);render();if(cloud)pull();};
  document.getElementById("nextD").onclick=function(){stepSel(1);render();if(cloud)pull();};
  document.getElementById("datePick").onchange=function(e){var v=e.target.value;if(!v)return;var p=v.split("-");setSelFromDate(new Date(+p[0],+p[1]-1,+p[2]));render();if(cloud)pull();};

  render(); // show cached data instantly
  (function(){
    var b=document.getElementById("build");
    b.innerHTML='<span class="chip" role="button" tabindex="0">↻ Build 16 · date-picker</span>';
    function force(){
      toast("Updating to latest…");
      var steps=Promise.resolve();
      if(window.caches) steps=steps.then(function(){return caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));});});
      if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations) steps=steps.then(function(){return navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));});});
      steps.then(function(){ setTimeout(function(){ location.reload(); },400); });
    }
    var chip=b.querySelector(".chip");
    chip.addEventListener("click",force);
    chip.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); force(); } });
  })();

  var decided=false;
  function decide(){
    if(decided) return; decided=true;
    document.getElementById("modeLine").textContent = cloud ? "Synced to your shared database." : localReason;
    document.querySelector(".foot").style.display = cloud ? "none" : "";
    if(cloud){
      setStatus("wait","Connecting…"); pull();
      try{ supa.channel("habits-sync")
        .on("postgres_changes",{event:"*",schema:"public",table:"logs"},pull)
        .on("postgres_changes",{event:"*",schema:"public",table:"habits"},pull)
        .on("postgres_changes",{event:"*",schema:"public",table:"people"},pull)
        .subscribe(); }catch(e){}
      window.addEventListener("online",function(){setStatus("wait","Back online…");flush();pull();});
      window.addEventListener("offline",function(){setStatus("wait","Offline — will sync");});
      document.addEventListener("visibilitychange",function(){if(!document.hidden)pull();});
    } else {
      setStatus("local", localReason);
    }
  }
  function startCloud(){
    try{ supa=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY); cloud=true; }
    catch(e){ cloud=false; localReason="Local only · sync error"; }
    decide();
  }
  if(!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY){
    cloud=false; localReason="Local only · no keys in file"; decide();
  } else if(window.supabase){
    startCloud();
  } else {
    // first CDN didn't load the sync library — try a fallback, then decide
    localReason="Local only · sync library blocked";
    var fb=document.createElement("script");
    fb.src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js";
    fb.onload=function(){ if(window.supabase) startCloud(); else decide(); };
    fb.onerror=function(){ decide(); };
    document.head.appendChild(fb);
    setTimeout(function(){ if(!decided){ if(window.supabase) startCloud(); else decide(); } }, 5000);
  }

  if("serviceWorker" in navigator){
    var hadController=!!navigator.serviceWorker.controller, swRefreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(swRefreshing) return;
      if(!hadController) return;               // first install on a fresh visit — no reload needed
      swRefreshing=true; location.reload();    // a new version took over — swap in seamlessly
    });
    window.addEventListener("load",function(){
      navigator.serviceWorker.register("./sw.js").then(function(reg){
        function check(){ try{ reg.update(); }catch(e){} }
        check();                                                   // on load
        setInterval(check, 15*60*1000);                            // every 15 min while open
        document.addEventListener("visibilitychange",function(){ if(!document.hidden) check(); }); // when refocused
        window.addEventListener("pageshow", check);                // when PWA/tab is resumed from background
        window.addEventListener("focus", check);
        window.addEventListener("online", check);                  // when back online
      }).catch(function(){});
    });
  }
  var deferred=null, installBtn=document.getElementById("installBtn");
  window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferred=e;installBtn.classList.add("show");});
  installBtn.onclick=function(){if(!deferred)return;deferred.prompt();deferred.userChoice.then(function(){deferred=null;installBtn.classList.remove("show");});};
  window.addEventListener("appinstalled",function(){installBtn.classList.remove("show");});
})();
</script>
</body>
</html>
