<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14181F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Daily Habits" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>Daily Habits — Pravin &amp; Swetha</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#ECEEE9;
    --surface:#FFFFFF;
    --surface-2:#F5F6F2;
    --ink:#161A20;
    --ink-2:#3A3F49;
    --muted:#767C86;
    --line:#E6E7E1;
    --line-2:#D6D8CF;
    --pravin:#E08A1E; --pravin-deep:#96570A;
    --swetha:#DD5A86; --swetha-deep:#A33560;
    --accent:var(--pravin); --accent-deep:var(--pravin-deep);
    --r:20px; --r-sm:13px; --r-xs:9px;
    --sh-1:0 1px 2px rgba(16,20,28,.05);
    --sh-2:0 2px 6px rgba(16,20,28,.06), 0 14px 34px -18px rgba(16,20,28,.30);
    --sh-3:0 4px 12px rgba(16,20,28,.08), 0 24px 48px -20px rgba(16,20,28,.34);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;color:var(--ink);
    background:radial-gradient(120% 90% at 50% -10%, color-mix(in srgb, var(--accent) 15%, var(--canvas)) 0%, var(--canvas) 46%) fixed;
    -webkit-font-smoothing:antialiased;line-height:1.45;
    padding-bottom:calc(56px + env(safe-area-inset-bottom));transition:background .5s ease;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 16px 40px}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  .display{font-family:"Bricolage Grotesque",sans-serif}

  header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
  .brand h1{font-family:"Bricolage Grotesque";font-weight:800;letter-spacing:-.035em;font-size:clamp(27px,6.4vw,42px);line-height:.96;margin:0}
  .brand h1 .g{background:linear-gradient(105deg,var(--pravin),var(--swetha));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .brand p{margin:7px 0 0;color:var(--muted);font-size:13px;max-width:44ch}
  .rightcol{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
  .monthnav{display:flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--sh-1)}
  .monthnav button{border:0;background:transparent;cursor:pointer;color:var(--ink);width:32px;height:32px;border-radius:999px;font-size:17px;display:grid;place-items:center;transition:.15s}
  .monthnav button:hover{background:var(--surface-2)}
  .monthnav .label{font-family:"Bricolage Grotesque";font-weight:700;padding:0 8px;font-size:14px;min-width:104px;text-align:center;letter-spacing:.01em}
  .datepick{border:0;background:transparent;font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:14px;color:var(--ink);padding:2px 6px;border-radius:8px;cursor:pointer;min-width:132px;text-align:center}
  .datepick:focus{outline:2px solid var(--accent);outline-offset:1px}
  .datepick::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6}
  .status{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:5px 11px;border-radius:999px;box-shadow:var(--sh-1)}
  .status .led{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none;transition:.3s}
  .status.ok .led{background:#2FA36B;box-shadow:0 0 0 3px rgba(47,163,107,.16)}
  .status.wait .led{background:#E0912A;box-shadow:0 0 0 3px rgba(224,145,42,.16)}
  .status.local .led{background:#8A909A}

  .tabs{display:flex;gap:5px;background:color-mix(in srgb,var(--surface) 82%, transparent);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:22px;box-shadow:var(--sh-1);position:sticky;top:8px;z-index:40;backdrop-filter:blur(10px) saturate(1.3)}
  .tab{flex:1;border:0;background:transparent;cursor:pointer;padding:10px 8px;border-radius:999px;font-family:"Bricolage Grotesque";font-weight:700;font-size:14.5px;color:var(--muted);letter-spacing:-.01em;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
  .tab .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .tab[data-who="pravin"] .dot{background:var(--pravin)}
  .tab[data-who="swetha"] .dot{background:var(--swetha)}
  .tab[data-who="both"] .dot{background:conic-gradient(from 210deg,var(--pravin),var(--swetha),var(--pravin))}
  .tab.active{color:#fff;box-shadow:0 6px 16px -7px rgba(16,20,28,.55)}
  .tab.active[data-who="pravin"]{background:linear-gradient(105deg,var(--pravin),var(--pravin-deep))}
  .tab.active[data-who="swetha"]{background:linear-gradient(105deg,var(--swetha),var(--swetha-deep))}
  .tab.active[data-who="both"]{background:linear-gradient(105deg,var(--pravin),var(--swetha))}
  .tab .dot{width:11px;height:11px}
  .tab.active .dot{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.28)}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 13px}
  .sec-name{--c:#888;font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
  .sec-name::before{content:"";width:11px;height:11px;border-radius:50%;background:var(--c)}
  .mini-edit{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);font-family:"Inter";font-weight:600;font-size:13px;padding:7px 12px;border-radius:10px;cursor:pointer;transition:.15s;box-shadow:var(--sh-1);white-space:nowrap}
  .mini-edit:hover{background:var(--surface-2);border-color:var(--accent);color:var(--accent-deep)}
  .mini-edit:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .eyebrow{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.17em;text-transform:uppercase;color:var(--muted);margin:0 0 13px;display:flex;align-items:center;gap:11px}
  .eyebrow::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line-2),transparent)}
  section{margin-bottom:30px}

  .today-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:13px;gap:10px}
  .today-head .date{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(21px,4.6vw,27px);letter-spacing:-.025em}
  .today-head .date span{background:linear-gradient(100deg,var(--accent),var(--accent-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .today-head .prog{font-size:13px;color:var(--muted);white-space:nowrap}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:11px}
  .card{--c:#888;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;text-align:left;box-shadow:var(--sh-2);position:relative;overflow:hidden;transition:transform .13s cubic-bezier(.2,.7,.2,1), box-shadow .2s, background .2s, border-color .2s;-webkit-tap-highlight-color:transparent}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);opacity:.32;transition:opacity .2s}
  .card:hover{box-shadow:var(--sh-3);border-color:var(--line-2)}
  .card:active{transform:scale(.98)}
  .card:focus-visible{outline:2px solid var(--c);outline-offset:2px}
  .card.done{background:color-mix(in srgb,var(--c) 12%,var(--surface));border-color:transparent}
  .card.done::before{opacity:1}
  .check{width:31px;height:31px;border-radius:10px;flex:none;display:grid;place-items:center;border:2px solid var(--line-2);color:#fff;background:var(--surface);transition:.2s}
  .card.done .check{background:var(--c);border-color:var(--c);box-shadow:0 4px 12px -3px color-mix(in srgb,var(--c) 60%,transparent)}
  .check svg{width:17px;height:17px;opacity:0;transform:scale(.4) rotate(-8deg);transition:.24s cubic-bezier(.2,.9,.2,1.3)}
  .card.done .check svg{opacity:1;transform:none}
  .card .body{min-width:0;flex:1}
  .card .name{font-weight:600;font-size:15px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .streak{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px}
  .card.done .streak{color:color-mix(in srgb,var(--c) 78%,#000)}
  .flame{width:12px;height:13px;flex:none}
  .empty-note{grid-column:1/-1;color:var(--muted);font-size:14px;padding:20px;text-align:center;border:1px dashed var(--line-2);border-radius:var(--r);background:var(--surface-2)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh-2);position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;left:17px;bottom:14px;width:26px;height:3px;border-radius:9px;background:linear-gradient(90deg,var(--accent),var(--accent-deep))}
  .stat .k{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(27px,6.6vw,36px);letter-spacing:-.035em;line-height:1}
  .stat .k small{font-size:15px;color:var(--muted);font-weight:600;margin-left:1px}
  .stat .l{font-size:12px;color:var(--muted);margin-top:16px;font-weight:500}

  .gridwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);overflow:hidden}
  .scroller{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.grid{border-collapse:separate;border-spacing:0;width:100%}
  table.grid th,table.grid td{padding:0;text-align:center}
  thead th{position:sticky;top:0;z-index:5;background:var(--surface);font-family:"IBM Plex Mono";font-size:11px;font-weight:500;color:var(--muted);height:36px;min-width:30px;border-bottom:1px solid var(--line-2)}
  thead th.today{color:var(--accent-deep);font-weight:600}
  thead th.today::after{content:"";display:block;height:2px;margin:3px 7px 0;border-radius:9px;background:var(--accent)}
  th.habitcol,td.habitcol{position:sticky;left:0;z-index:6;background:var(--surface);text-align:left;min-width:136px;max-width:136px;padding:0 12px;border-right:1px solid var(--line-2)}
  thead th.habitcol{z-index:7}
  td.habitcol{font-size:13px;font-weight:500;height:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
  td.habitcol .swatch{width:9px;height:9px;border-radius:50%;flex:none}
  th.countcol,td.countcol{position:sticky;right:0;z-index:6;background:var(--surface-2);min-width:46px;border-left:1px solid var(--line-2);font-family:"IBM Plex Mono";font-weight:600;font-size:13px}
  thead th.countcol{z-index:7;color:var(--muted)}
  tbody td{height:40px;border-bottom:1px solid var(--line)}
  td.day{min-width:30px}
  td.day.col-today{background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
  .cell{--c:#888;position:relative;width:23px;height:23px;margin:auto;border-radius:8px;border:1.5px solid var(--line-2);background:var(--surface);cursor:pointer;padding:0;display:block;transition:background .13s,border-color .13s,border-radius .13s,width .13s,margin .13s;-webkit-tap-highlight-color:transparent}
  .cell.sk{background:var(--surface-2);border-color:var(--line-2)}
  .cell.sk::after{content:"";position:absolute;left:5px;right:5px;top:50%;height:2px;border-radius:2px;background:var(--muted);transform:translateY(-50%)}
  .cell:hover{border-color:var(--c)}
  .cell.on{background:var(--c);border-color:var(--c)}
  .cell.on.lnkL{border-top-left-radius:2px;border-bottom-left-radius:2px;margin-left:-4px;width:27px}
  .cell.on.lnkR{border-top-right-radius:2px;border-bottom-right-radius:2px;margin-right:-4px;width:27px}
  .cell.on.lnkL.lnkR{width:31px}
  .cell:focus-visible{outline:2px solid var(--c);outline-offset:2px}
  tfoot td{height:36px;background:var(--surface-2);border-top:1px solid var(--line-2);font-family:"IBM Plex Mono";font-size:11px;font-weight:600;color:var(--muted)}
  tfoot td.total-on{color:var(--accent-deep)}
  tfoot td.habitcol{font-family:"Inter";font-size:11px;text-transform:uppercase;letter-spacing:.09em}
  .gridhint{padding:12px 15px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
  /* today card: rest-day (skip) state */
  .card.skip{background:var(--surface-2);border-color:var(--line);opacity:.9}
  .card.skip::before{opacity:.35;background:var(--muted)}
  .card.skip .check{background:var(--surface);border-color:var(--line-2);color:var(--muted)}
  .card.skip .check svg{opacity:1;transform:none}
  .card .streak.rest{color:var(--muted)}
  /* today note */
  .noterow{margin-top:11px}
  .noterow textarea{width:100%;min-height:52px;resize:vertical;border:1px solid var(--line);border-radius:14px;background:var(--surface);
    padding:12px 14px;font-family:"Inter";font-size:14px;color:var(--ink);box-shadow:var(--sh-1)}
  .noterow textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .noterow .nlabel{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  .noterow .noterowbtn{margin-top:9px}
  /* day-header note button */
  thead th .dnum{border:0;background:transparent;font:inherit;color:inherit;cursor:pointer;padding:2px 4px;border-radius:6px;position:relative}
  thead th .dnum:hover{background:var(--surface-2)}
  thead th .dnum.hasnote::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
  /* cadence picker */
  .freqbtn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-family:"IBM Plex Mono";font-size:11px;font-weight:500;
    padding:5px 9px;border-radius:8px;cursor:pointer;flex:none;white-space:nowrap}
  .freqbtn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .freqpanel{display:none;gap:6px;padding:11px 12px;flex-wrap:wrap;background:var(--surface-2);border-bottom:1px solid var(--line);align-items:center}
  .freqpanel.open{display:flex}
  .freqpanel .fq{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);font-family:"Inter";font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer}
  .freqpanel .fq.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .freqpanel .flbl{font-size:12px;color:var(--muted);width:100%;margin-bottom:2px}
  /* note modal */
  .modal-bg{position:fixed;inset:0;background:rgba(16,20,28,.42);backdrop-filter:blur(2px);display:none;place-items:center;z-index:100;padding:20px}
  .modal-bg.open{display:grid}
  .modal{background:var(--surface);border-radius:20px;box-shadow:0 24px 60px -18px rgba(0,0,0,.5);max-width:440px;width:100%;padding:20px;border:1px solid var(--line)}
  .modal h4{font-family:"Bricolage Grotesque";font-weight:800;font-size:18px;margin:0 0 3px;letter-spacing:-.02em}
  .modal .msub{font-size:12px;color:var(--muted);margin-bottom:13px}
  .modal textarea{width:100%;min-height:96px;resize:vertical;border:1px solid var(--line-2);border-radius:13px;padding:12px 14px;font-family:"Inter";font-size:14px;background:var(--surface-2)}
  .modal textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .modal .mrow{display:flex;justify-content:flex-end;gap:9px;margin-top:14px}
  /* coach recent notes */
  .noteslist{margin-top:15px;border-top:1px solid var(--line);padding-top:13px}
  .noteslist .nl-h{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .noteslist .nl{font-size:13px;line-height:1.5;margin-bottom:9px;display:flex;gap:9px}
  .noteslist .nl .dd{font-family:"IBM Plex Mono";font-size:11px;color:var(--muted);flex:none;padding-top:1px;min-width:34px}
  .noteslist .nl .bd{color:var(--ink);font-weight:600}
  .notecallout{margin-top:14px;background:#FBF4E8;border:1px solid #EAD9BC;border-left:5px solid var(--pc,var(--accent));border-radius:12px;padding:12px 14px}
  .notecallout .nc-h{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9A6A16;margin-bottom:6px;font-weight:600}
  .notecallout .nc-body{font-size:15px;font-weight:700;color:var(--ink);line-height:1.5;white-space:pre-wrap}
  .noteslist .nl-empty{font-size:12.5px;color:var(--muted)}
  .dchips{display:flex;flex-wrap:wrap;gap:6px}
  .dchip{--c:#888;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:var(--surface)}
  .dchip.done{background:var(--c);border-color:transparent;color:#fff}
  .dchip.skip{border-style:dashed;color:var(--ink-2)}
  .dchip.miss{opacity:.65}
  /* sub navigation (sections within a person) */
  .subnav{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:20px}
  .subtab{flex:1;border:0;background:transparent;cursor:pointer;padding:9px 6px;border-radius:10px;font-family:"Inter";font-weight:600;font-size:13.5px;color:var(--muted);transition:.15s}
  .subtab:hover{color:var(--ink)}
  .subtab.active{background:var(--surface);color:var(--accent-deep);box-shadow:var(--sh-1)}
  .subtab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* quick cards on Today */
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-2);padding:14px 15px}
  .qlabel{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .qcard .winput{margin:0}
  /* food */
  .foodadd{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .foodadd input[type=time]{border:1px solid var(--line-2);border-radius:11px;padding:9px 11px;font-family:"IBM Plex Mono";font-size:13px;background:var(--surface);color:var(--ink);flex:none}
  .foodadd input[type=text]{flex:1;min-width:120px;border:1px solid var(--line-2);border-radius:11px;padding:10px 13px;font-family:"Inter";font-size:14px;background:var(--surface)}
  .foodadd input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .meals{display:flex;flex-direction:column;gap:2px}
  .meal{display:flex;align-items:center;gap:11px;padding:8px 2px;border-bottom:1px solid var(--line)}
  .meal:last-child{border-bottom:0}
  .meal .mtime{font-family:"IBM Plex Mono";font-size:12px;color:var(--muted);flex:none;min-width:44px}
  .meal .mitem{flex:1;font-size:14px;color:var(--ink)}
  .meal .mdel{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;width:26px;height:26px;border-radius:7px;flex:none}
  .meal .mdel:hover{background:#F7DFE4;color:var(--swetha-deep)}
  .meal-empty{font-size:13px;color:var(--muted);padding:6px 2px}
  .mealday{margin-top:16px}
  .mealday .mday-h{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;padding-top:12px;border-top:1px solid var(--line-2)}
  @media (max-width:560px){ .qgrid{grid-template-columns:1fr} }
  .qspan{grid-column:1/-1}
  .water-total{font-size:22px;font-weight:750;color:var(--ink);margin:2px 0 8px}
  .water-total .water-goal{font-size:12px;font-weight:600;color:var(--muted)}
  .water-bar{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-bottom:11px}
  .water-bar i{display:block;height:100%;border-radius:99px;transition:width .25s ease}
  .water-btns{display:flex;flex-wrap:wrap;gap:7px}

      pho.forEach(function(p){ fresh.photos[p.id]={person:p.person,ym:p.ym,day:p.day,path:p.path}; });
      outbox.forEach(function(op){ applyOpLocal(fresh,op); });
      ["pravin","swetha"].forEach(function(w){ fresh.habits[w].sort(function(a,b){return a.sort-b.sort;}); });
      state=fresh; saveCache(); render();
      setStatus(outbox.length?"wait":"ok", outbox.length?"Syncing…":"Synced"); flush();

  function applyOpLocal(s,op){
    if(op.k==="log"){var key=op.hid+"|"+op.ym+"|"+op.day;if(op.state)s.logs[key]=op.state;else delete s.logs[key];}
    else if(op.k==="note"){var nkey=op.person+"|"+op.ym+"|"+op.day;if(op.body)s.notes[nkey]=op.body;else delete s.notes[nkey];}
    else if(op.k==="weight"){var wkey=op.person+"|"+op.ym+"|"+op.day;if(op.kg!=null)s.weights[wkey]=op.kg;else delete s.weights[wkey];}
    else if(op.k==="water"){if(!s.water)s.water={};var wak=op.person+"|"+op.ym+"|"+op.day;if(op.ml!=null&&op.ml>0)s.water[wak]=op.ml;else delete s.water[wak];}
    else if(op.k==="steps"){if(!s.steps)s.steps={};var stk=op.person+"|"+op.ym+"|"+op.day;if(op.count!=null&&op.count>0)s.steps[stk]=op.count;else delete s.steps[stk];}
    else if(op.k==="body"){if(!s.body)s.body={};var bk=op.person+"|"+op.ym+"|"+op.day;var bany=op.bf!=null||op.smm!=null||op.vf!=null||op.fm!=null;if(bany)s.body[bk]={bf:op.bf,smm:op.smm,vf:op.vf,fm:op.fm};else delete s.body[bk];}
    else if(op.k==="photoAdd"){if(!s.photos)s.photos={};s.photos[op.id]={person:op.person,ym:op.ym,day:op.day,path:op.path};}
    else if(op.k==="photoDel"){if(s.photos)delete s.photos[op.id];}
    else if(op.k==="mealAdd"){ if(!s.meals)s.meals={}; s.meals[op.id]={person:op.person,ym:op.ym,day:op.day,at:op.at,item:op.item,sort:op.sort||0}; }
    else if(op.k==="mealDel"){ if(s.meals) delete s.meals[op.id]; }
    else if(op.k==="mealSort"){ if(s.meals&&s.meals[op.id]) s.meals[op.id].sort=op.sort; }
    else if(op.k==="habitAdd"){if(s.habits[op.person])s.habits[op.person].push({id:op.id,label:op.label,color:op.color,sort:op.sort,week:op.week||0});}
    else if(op.k==="habitRename"){eachHabit(s,function(h){if(h.id===op.id)h.label=op.label;});}
    else if(op.k==="habitColor"){eachHabit(s,function(h){if(h.id===op.id)h.color=op.color;});}
    else if(op.k==="habitFreq"){eachHabit(s,function(h){if(h.id===op.id)h.week=op.week;});}
    else if(op.k==="habitSort"){eachHabit(s,function(h){if(h.id===op.id)h.sort=op.sort;});["pravin","swetha"].forEach(function(w){s.habits[w].sort(function(a,b){return a.sort-b.sort;});});}
    else if(op.k==="habitDel"){["pravin","swetha"].forEach(function(w){s.habits[w]=s.habits[w].filter(function(h){return h.id!==op.id;});});}
    else if(op.k==="person"){if(s.names[op.person]!==undefined)s.names[op.person]=op.name;}
  }

  // Dependency-free SVG line chart. series=[{name,color,points:[{x,y}]}], dim=days in month.
  function weightChart(series,dim){
    var all=[], xs=[]; series.forEach(function(s){s.points.forEach(function(p){all.push(p.y);xs.push(p.x);});});
    if(!all.length) return "";
    var yMin=Math.min.apply(null,all), yMax=Math.max.apply(null,all);
    if(yMin===yMax){ yMin-=1; yMax+=1; } else { var pad=(yMax-yMin)*0.15; yMin-=pad; yMax+=pad; }
    yMin=Math.floor(yMin*2)/2; yMax=Math.ceil(yMax*2)/2;   // snap to 0.5 kg for readable labels
    var xMin=Math.min.apply(null,xs), xMax=Math.max.apply(null,xs);
    if(xMin===xMax){ xMin-=1; xMax+=1; }   // single day → give the point room instead of stranding it
    var W=340,H=190,ml=34,mr=12,mt=14,mb=22, pw=W-ml-mr, ph=H-mt-mb;
    function X(d){return ml+(d-xMin)/(xMax-xMin)*pw;}
    function Y(v){return mt+(yMax-v)/(yMax-yMin)*ph;}
    var mon=MONTHS[view.m].slice(0,3);
    var labelByX={}; series.forEach(function(s){s.points.forEach(function(p){ if(p.label!=null) labelByX[p.x]=p.label; });});
    var svg='<svg viewBox="0 0 '+W+' '+H+'" class="wchart" preserveAspectRatio="none" role="img">';
    for(var g=0;g<=2;g++){
      var v=yMin+(yMax-yMin)*g/2, y=Y(v);
      svg+='<line x1="'+ml+'" y1="'+y.toFixed(1)+'" x2="'+(W-mr)+'" y2="'+y.toFixed(1)+'" class="wgrid"/>';
      svg+='<text x="'+(ml-5)+'" y="'+(y+3).toFixed(1)+'" class="wylab">'+v.toFixed(1)+'</text>';
    }
    var mid=Math.round((xMin+xMax)/2);
    [xMin,mid,xMax].filter(function(d,i,a){return a.indexOf(d)===i;}).forEach(function(d){
      var lab=(labelByX[d]!=null)?labelByX[d]:'';
      if(!lab) return;
      var anc = d===xMin?'start':(d===xMax?'end':'middle');
      svg+='<text x="'+X(d).toFixed(1)+'" y="'+(H-6)+'" class="wxlab" text-anchor="'+anc+'">'+lab+'</text>';
    });
    series.forEach(function(s){
      if(!s.points.length) return;
      var dstr=s.points.map(function(p,i){return (i?'L':'M')+X(p.x).toFixed(1)+' '+Y(p.y).toFixed(1);}).join(' ');
      svg+='<path d="'+dstr+'" fill="none" stroke="'+s.color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" class="wline"/>';
      s.points.forEach(function(p){ svg+='<circle cx="'+X(p.x).toFixed(1)+'" cy="'+Y(p.y).toFixed(1)+'" r="3.2" fill="#fff" stroke="'+s.color+'" stroke-width="2"/>'; });
    });
    svg+='</svg>';
    return svg;
  }

  function allMonths(){
    var set={};

    for(var k in state.weights) add(k.split("|")[1]);
    for(var k in state.water) add(k.split("|")[1]);
    for(var k in state.steps) add(k.split("|")[1]);

    for(var k in state.notes) add(k.split("|")[1]);
    for(var k in state.logs) add(k.split("|")[1]);
    for(var id in state.meals) add(state.meals[id].ym);

  function ptsFor(store,who,ym){ var a=[],days=ymDays(ym); for(var d=1;d<=days;d++){var v=store[who+"|"+ym+"|"+d]; if(v!=null&&v!=="") a.push({x:d,y:+v});} return a; }

  // ───────── HTML progress report ─────────
  var REP_PLACEHOLDER="data:image/svg+xml;utf8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="160"><rect width="120" height="160" fill="#efeae2"/><text x="60" y="82" font-size="9" fill="#9a948a" text-anchor="middle">image unavailable</text></svg>');
  function repLine(pts,color){
    if(!pts.length) return '<div style="color:#9a948a;font-size:12px;padding:6px 0">No data</div>';
    var W=300,H=92,pad=11, xs=pts.map(function(p){return p.x;}), ys=pts.map(function(p){return p.y;});
    var xmin=Math.min.apply(null,xs),xmax=Math.max.apply(null,xs); if(xmin===xmax)xmax=xmin+1;
    var ymin=Math.min.apply(null,ys),ymax=Math.max.apply(null,ys); if(ymin===ymax){ymin-=1;ymax+=1;} var p2=(ymax-ymin)*0.15; ymin-=p2; ymax+=p2;
    function X(x){return (pad+(x-xmin)/(xmax-xmin)*(W-2*pad)).toFixed(1);}
    function Y(y){return (H-pad-(y-ymin)/(ymax-ymin)*(H-2*pad)).toFixed(1);}
    var d=pts.map(function(p,i){return (i?'L':'M')+X(p.x)+' '+Y(p.y);}).join(' ');
    var dots=pts.map(function(p){return '<circle cx="'+X(p.x)+'" cy="'+Y(p.y)+'" r="2.4" fill="#fff" stroke="'+color+'" stroke-width="1.6"/>';}).join('');
    return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:340px;height:auto;margin-top:4px"><path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>'+dots+'</svg>';

  function fetchAsDataURL(url){

      .then(function(b){ return new Promise(function(res,rej){ var fr=new FileReader(); fr.onload=function(){res(fr.result);}; fr.onerror=function(){rej(new Error("read failed"));}; fr.readAsDataURL(b); }); });

  function wireTimelapse(root){

    var frames=root.querySelectorAll(".tl-frame"), n=frames.length;
    if(!n) return;
    var stageDate=root.querySelector(".tl-date"), scrub=root.querySelector(".tl-scrub"), playBtn=root.querySelector(".tl-play");
    var idx=0, playing=false, speed=800;
    function show(i){ idx=((i%n)+n)%n; for(var f=0;f<n;f++) frames[f].style.opacity=(f===idx?1:0); if(stageDate) stageDate.textContent=frames[idx].getAttribute("data-date")||""; if(scrub) scrub.value=idx; }
    function stop(){ playing=false; if(tlTimers[key]){clearInterval(tlTimers[key]); tlTimers[key]=null;} if(playBtn) playBtn.innerHTML="\u25B6 Play"; }
    function play(){ playing=true; if(playBtn) playBtn.innerHTML="\u23F8 Pause"; if(tlTimers[key]) clearInterval(tlTimers[key]); tlTimers[key]=setInterval(function(){ show(idx+1); }, speed); }
    if(playBtn) playBtn.onclick=function(){ playing?stop():play(); };
    if(scrub) scrub.oninput=function(){ stop(); show(+scrub.value); };
    root.querySelectorAll(".tl-sp").forEach(function(b){ b.onclick=function(){ speed=+b.getAttribute("data-sp"); root.querySelectorAll(".tl-sp").forEach(function(x){x.classList.remove("active");}); b.classList.add("active"); if(playing) play(); }; });
    show(0);
  }

    catch(e){ cloud=false; localReason="Local only · sync error"; }
    decide();
  }
  function failLib(){ if(decided) return; cloud=false; localReason="Local only · sync engine didn’t load (check supabase.min.js is deployed)"; decide(); }
  if(!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY){
    cloud=false; localReason="Local only · no keys in file"; decide();
  } else {
    var tries=0;
    (function waitLib(){
      if(decided) return;
      if(window.supabase){ startCloud(); return; }
      if(++tries>15){   // ~3s — the self-hosted library should be ready well before this
        // last resort: public CDN (only helps if this network allows it)
        var fb=document.createElement("script");
        fb.src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js";
        fb.onload=function(){ window.supabase?startCloud():failLib(); };
        fb.onerror=failLib;
        document.head.appendChild(fb);
        setTimeout(function(){ if(!decided){ window.supabase?startCloud():failLib(); } },4000);
        return;
      }
      setTimeout(waitLib,200);
    })();
  }

  if("serviceWorker" in navigator){
    var hadController=!!navigator.serviceWorker.controller, swRefreshing=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(swRefreshing) return;
      if(!hadController) return;               // first install on a fresh visit — no reload needed
      swRefreshing=true; location.reload();    // a new version took over — swap in seamlessly
    });
    window.addEventListener("load",function(){
      navigator.serviceWorker.register("./sw.js").then(function(reg){
        function check(){ try{ reg.update(); }catch(e){} }
        check();                                                   // on load
        setInterval(check, 15*60*1000);                            // every 15 min while open
        document.addEventListener("visibilitychange",function(){ if(!document.hidden) check(); }); // when refocused
        window.addEventListener("pageshow", check);                // when PWA/tab is resumed from background
        window.addEventListener("focus", check);
        window.addEventListener("online", check);                  // when back online
      }).catch(function(){});
    });
  }
  var deferred=null, installBtn=document.getElementById("installBtn");
  window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferred=e;installBtn.classList.add("show");});
  installBtn.onclick=function(){if(!deferred)return;deferred.prompt();deferred.userChoice.then(function(){deferred=null;installBtn.classList.remove("show");});};
  window.addEventListener("appinstalled",function(){installBtn.classList.remove("show");});
})();
</script>
</body>
</html>
